<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:linear-gradient(135deg,#e60023,#ff6a00);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{

width:100%;
max-width:650px;

background:#fff;
border-radius:16px;
padding:30px;

box-shadow:0 15px 40px rgba(0,0,0,0.2);

}

.logo{

text-align:center;
font-size:28px;
font-weight:bold;
color:#e60023;
margin-bottom:25px;

}

.inputBox{

width:100%;

}

input{

width:100%;
padding:14px;

border-radius:10px;
border:1px solid #ddd;

font-size:16px;

}

.download-main{

width:100%;
margin-top:12px;

padding:14px;

background:#e60023;
color:white;

border:none;
border-radius:10px;

font-size:16px;
cursor:pointer;

}

.download-main:hover{
background:#c4001f;
}

.loader{

display:none;
text-align:center;

margin-top:20px;
font-size:18px;

}

.result{

display:none;
margin-top:25px;

}

.result img{

width:100%;
border-radius:12px;
margin-bottom:15px;

}

.title{

font-size:18px;
font-weight:600;
margin-bottom:15px;

}

.downloads{

display:flex;
flex-direction:column;
gap:10px;

}

.download-btn{

background:#111;
color:white;

padding:12px;

border-radius:8px;

border:none;

cursor:pointer;

font-size:15px;

}

.download-btn:hover{
background:#333;
}

</style>

</head>


<body>

<div class="container">

<div class="logo">
<i class="fab fa-pinterest"></i> Pinterest Downloader
</div>


<div class="inputBox">

<input id="url" placeholder="Paste Pinterest link here...">

<button class="download-main" onclick="downloadMedia()">
Download
</button>

</div>


<div class="loader" id="loader">

<i class="fa fa-spinner fa-spin"></i> Fetching media...

</div>


<div class="result" id="result">

<img id="thumb">

<div class="title" id="title"></div>

<div class="downloads" id="downloads"></div>

</div>

</div>



<script>

async function downloadMedia(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Pinterest URL")

return

}

document.getElementById("loader").style.display="block"
document.getElementById("result").style.display="none"

let api=`https://universaldownloader-zeta.vercel.app/api/pinterest/download?url=${encodeURIComponent(url)}`

try{

let res=await fetch(api)

let data=await res.json()

document.getElementById("loader").style.display="none"

if(!data.success){

alert("Download failed")

return

}

let info=data.data

document.getElementById("result").style.display="block"

document.getElementById("thumb").src=info.thumbnail

document.getElementById("title").innerText=info.title


let downloads=document.getElementById("downloads")

downloads.innerHTML=""

info.downloads.forEach(d=>{

let btn=document.createElement("button")

btn.innerText=`Download ${d.quality} (${d.format})`

btn.className="download-btn"

btn.onclick=()=>forceDownload(d.url)

downloads.appendChild(btn)

})

}

catch(e){

document.getElementById("loader").style.display="none"

alert("API Error")

}

}



function forceDownload(url){

let iframe=document.createElement("iframe")

iframe.style.display="none"

iframe.src=url

document.body.appendChild(iframe)

setTimeout(()=>{

document.body.removeChild(iframe)

},5000)

}

</script>

</body>
</html>
