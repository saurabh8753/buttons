<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Downloader</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(135deg,#ff003c,#ff7b00);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.container{

width:100%;
max-width:650px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.25);

color:white;

box-shadow:0 15px 40px rgba(0,0,0,0.3);

}

.logo{

text-align:center;

font-size:28px;

font-weight:bold;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

border-radius:10px;

border:none;

font-size:16px;

margin-bottom:12px;

}

.main-btn{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#ff003c;

color:white;

font-size:16px;

cursor:pointer;

}

.main-btn:hover{

background:#d90032;

}

/* Loader */

.loader{

display:none;

text-align:center;

margin-top:20px;

}

.spinner{

width:45px;
height:45px;

border:4px solid rgba(255,255,255,0.3);

border-top:4px solid white;

border-radius:50%;

animation:spin 1s linear infinite;

margin:auto;

}

@keyframes spin{

100%{transform:rotate(360deg)}

}

.preview{

margin-top:20px;

animation:fade 0.4s ease;

}

.preview img,
.preview video{

width:100%;

border-radius:14px;

box-shadow:0 5px 20px rgba(0,0,0,0.3);

}

.downloads{

margin-top:20px;

display:flex;

flex-direction:column;

gap:14px;

}

/* Professional download cards */

.download-card{

display:flex;

align-items:center;

justify-content:space-between;

background:rgba(0,0,0,0.5);

padding:14px 18px;

border-radius:12px;

cursor:pointer;

transition:0.3s;

}

.download-card:hover{

transform:translateY(-2px);

background:rgba(0,0,0,0.7);

}

.left{

display:flex;

align-items:center;

gap:12px;

}

.icon{

font-size:20px;

}

.quality{

font-weight:bold;

}

.format{

opacity:0.8;

font-size:13px;

}

.download-btn{

background:#ff003c;

border:none;

padding:8px 14px;

border-radius:8px;

color:white;

cursor:pointer;

}

.download-btn:hover{

background:#d90032;

}

@keyframes fade{

from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}

}

</style>

</head>


<body>

<div class="container">

<div class="logo">
<i class="fab fa-pinterest"></i> Pinterest Downloader
</div>

<input id="url" placeholder="Paste Pinterest link here">

<button class="main-btn" onclick="fetchMedia()">
Download
</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div class="preview" id="preview"></div>

<div class="downloads" id="downloads"></div>

</div>


<script>

async function fetchMedia(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Pinterest URL")

return

}

document.getElementById("loader").style.display="block"

let api=`https://universal-downloaders.vercel.app/api/pinterest/download?url=${encodeURIComponent(url)}`

try{

let res=await fetch(api)

let data=await res.json()

document.getElementById("loader").style.display="none"

let info=data.data

let preview=document.getElementById("preview")

let downloads=document.getElementById("downloads")

preview.innerHTML=""

downloads.innerHTML=""

let first=info.downloads[0].url


if(first.includes(".mp4")){

preview.innerHTML=`<video controls src="${first}"></video>`

}else{

preview.innerHTML=`<img src="${info.thumbnail}">`

}


/* Create download cards */

info.downloads.forEach(d=>{

let card=document.createElement("div")

card.className="download-card"

card.innerHTML=`

<div class="left">

<i class="fa fa-download icon"></i>

<div>

<div class="quality">${d.quality}</div>

<div class="format">${d.format}</div>

</div>

</div>

<button class="download-btn">
Download
</button>

`

card.onclick=()=>downloadFile(d.url)

downloads.appendChild(card)

})

}

catch{

document.getElementById("loader").style.display="none"

alert("API Error")

}

}


function downloadFile(url){

const proxy=
"https://universal-downloaders.vercel.app/api/pinterest/file?url="+encodeURIComponent(url)

window.open(proxy)

}

</script>

</body>
</html>
