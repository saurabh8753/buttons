<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Downloader PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #e60023, #ff7b00); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { width:100%; max-width:450px; background:rgba(255,255,255,0.15); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:25px; color:white; box-shadow:0 15px 35px rgba(0,0,0,0.2); text-align:center; }
        input { width:100%; padding:14px; border-radius:10px; border:none; margin-bottom:12px; font-size:15px; outline:none; }
        .fetch-btn { width:100%; padding:14px; border:none; border-radius:10px; background:#ff003c; color:white; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:20px; }
        .loader { display:none; margin:20px 0; }
        .spinner { width:30px; height:30px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 1s infinite linear; margin:0 auto; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .result { display:none; margin-top:20px; }
        .preview img, .preview video { width:100%; border-radius:12px; margin-bottom:15px; }
        .dl-btn { background:#000; color:#fff; width:100%; padding:12px; border-radius:8px; border:none; cursor:pointer; font-weight:600; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:10px; transition:0.2s; }
        .dl-btn:disabled { background:#555; cursor:not-allowed; }
        .dl-btn:hover:not(:disabled) { background:#222; transform:translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom:20px;"><i class="fab fa-pinterest"></i> PIN PRO</h2>
    <input type="text" id="url" placeholder="Paste Pinterest link here...">
    <button class="fetch-btn" id="fetchBtn" onclick="fetchContent()">Fetch Media</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top:10px; font-size:14px;">Processing...</p>
    </div>

    <div class="result" id="result">
        <div class="preview" id="preview"></div>
        <div id="downloadOptions"></div>
    </div>
</div>

<script>
    const API_URL = "https://universal-downloaders.vercel.app/api/pinterest";

    async function fetchContent() {
        const urlInput = document.getElementById('url').value;
        if(!urlInput) return alert("Please paste a link!");

        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        
        loader.style.display = "block";
        result.style.display = "none";

        try {
            const res = await fetch(`${API_URL}/download?url=${encodeURIComponent(urlInput)}`);
            const json = await res.json();
            
            loader.style.display = "none";
            if(!json.success) throw new Error("Failed");

            showResult(json.data);
        } catch(e) {
            loader.style.display = "none";
            alert("Error fetching media. Make sure the link is valid.");
        }
    }

    function showResult(data) {
        const result = document.getElementById('result');
        const preview = document.getElementById('preview');
        const options = document.getElementById('downloadOptions');
        
        result.style.display = "block";
        preview.innerHTML = data.downloads[0].url.includes('.mp4') 
            ? `<video src="${data.downloads[0].url}" controls></video>` 
            : `<img src="${data.thumbnail}">`;

        options.innerHTML = "";
        data.downloads.forEach(dl => {
            const btn = document.createElement('button');
            btn.className = "dl-btn";
            btn.innerHTML = `<i class="fa fa-download"></i> Save ${dl.quality}`;
            btn.onclick = () => forceDownload(dl.url, btn);
            options.appendChild(btn);
        });
    }

    async function forceDownload(fileUrl, btn) {
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Saving to device...`;

        try {
            // Hum direct proxy route ko fetch kar rahe hain
            const proxyUrl = `${API_URL}/proxy-file?url=${encodeURIComponent(fileUrl)}`;
            const response = await fetch(proxyUrl);
            const blob = await response.blob();
            
            // Temporary URL banakar download trigger karna
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `pinterest_${Date.now()}.mp4`; // extension force
            document.body.appendChild(a);
            a.click();
            
            // Cleanup
            window.URL.revokeObjectURL(blobUrl);
            document.body.removeChild(a);
        } catch (err) {
            alert("Download failed. Opening in new tab as fallback.");
            window.open(fileUrl, '_blank');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
