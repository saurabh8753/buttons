<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Downloader PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(135deg,#e60023,#ff7b00);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.container{

width:100%;
max-width:700px;

backdrop-filter:blur(20px);

background:rgba(255,255,255,0.15);

border:1px solid rgba(255,255,255,0.3);

border-radius:20px;

padding:30px;

color:white;

box-shadow:0 10px 40px rgba(0,0,0,0.3);

}

.logo{

font-size:28px;

font-weight:bold;

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

border-radius:10px;

border:none;

margin-bottom:12px;

font-size:16px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#ff003c;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#d90032;

}

.loader{

display:none;

text-align:center;

margin-top:15px;

}

.result{

margin-top:25px;

display:none;

}

.preview{

margin-bottom:20px;

}

.preview img,

.preview video{

width:100%;

border-radius:12px;

}

.title{

font-size:18px;

margin-bottom:15px;

}

.downloads{

display:flex;

flex-direction:column;

gap:10px;

}

.download-btn{

background:#111;

padding:12px;

border-radius:8px;

cursor:pointer;

border:none;

color:white;

}

.download-btn:hover{

background:#333;

}

.progress{

height:8px;

background:rgba(255,255,255,0.3);

border-radius:10px;

margin-top:10px;

overflow:hidden;

display:none;

}

.bar{

height:100%;

width:0%;

background:#00ff9c;

}

</style>

</head>


<body>


<div class="container">

<div class="logo">

<i class="fab fa-pinterest"></i> Pinterest Downloader PRO

</div>


<input id="url" placeholder="Paste Pinterest link here...">

<button onclick="downloadMedia()">

Download

</button>


<div class="loader" id="loader">

<i class="fa fa-spinner fa-spin"></i> Fetching media...

</div>


<div class="progress" id="progress">

<div class="bar" id="bar"></div>

</div>


<div class="result" id="result">

<div class="preview" id="preview"></div>

<div class="title" id="title"></div>

<div class="downloads" id="downloads"></div>

</div>

</div>


<script>

async function downloadMedia(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Pinterest URL")

return

}

document.getElementById("loader").style.display="block"

document.getElementById("result").style.display="none"


let api=`https://universaldownloader-zeta.vercel.app/api/pinterest/download?url=${encodeURIComponent(url)}`


try{

let res=await fetch(api)

let data=await res.json()

document.getElementById("loader").style.display="none"


if(!data.success){

alert("Download failed")

return

}


let info=data.data


document.getElementById("result").style.display="block"

document.getElementById("title").innerText=info.title


let preview=document.getElementById("preview")

preview.innerHTML=""


let first=info.downloads[0].url


if(first.includes(".mp4")){

preview.innerHTML=`<video controls src="${first}"></video>`

}

else{

preview.innerHTML=`<img src="${info.thumbnail}">`

}


let downloads=document.getElementById("downloads")

downloads.innerHTML=""


info.downloads.forEach(d=>{


let btn=document.createElement("button")

btn.className="download-btn"

btn.innerText=`Download ${d.quality} (${d.format})`


btn.onclick=()=>downloadFile(d.url)


downloads.appendChild(btn)


})


}

catch(e){

document.getElementById("loader").style.display="none"

alert("API Error")

}

}



function downloadFile(url){


let progress=document.getElementById("progress")

let bar=document.getElementById("bar")

progress.style.display="block"


let percent=0


let interval=setInterval(()=>{


percent+=10

bar.style.width=percent+"%"


if(percent>=100){

clearInterval(interval)

forceDownload(url)

progress.style.display="none"

bar.style.width="0%"

}


},100)

}



function forceDownload(url){


let a=document.createElement("a")

a.href=url

a.download="pinterest-media"

document.body.appendChild(a)

a.click()

document.body.removeChild(a)

}

</script>


</body>

</html>
