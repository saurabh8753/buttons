<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#e60023,#ff7b00);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
max-width:600px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#e60023;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#e60023;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.preview img,
.preview video{
width:100%;
margin-top:20px;
border-radius:10px;
}

.download-btn{
background:#111;
margin-top:10px;
}

</style>

</head>


<body>

<div class="container">

<h1>Pinterest Downloader</h1>

<input id="url" placeholder="Paste Pinterest link">

<button onclick="fetchMedia()">Download</button>

<div class="preview" id="preview"></div>

<div id="downloads"></div>

</div>



<script>

async function fetchMedia(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Pinterest URL")

return

}

let api=`https://universal-downloaders.vercel.app/api/pinterest/download?url=${encodeURIComponent(url)}`

let res=await fetch(api)

let data=await res.json()

let info=data.data

let preview=document.getElementById("preview")

let downloads=document.getElementById("downloads")

preview.innerHTML=""
downloads.innerHTML=""

let first=info.downloads[0].url


if(first.includes(".mp4")){

preview.innerHTML=`<video controls src="${first}"></video>`

}else{

preview.innerHTML=`<img src="${info.thumbnail}">`

}


info.downloads.forEach(d=>{

let btn=document.createElement("button")

btn.className="download-btn"

btn.innerText=`Download ${d.quality} (${d.format})`

btn.onclick=()=>downloadFile(d.url)

downloads.appendChild(btn)

})

}



function downloadFile(url){

const proxy=
"https://universal-downloaders.vercel.app/api/pinterest/file?url="
+encodeURIComponent(url)

window.open(proxy)

}

</script>

</body>
</html>
