<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pinterest Downloader PRO</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(135deg,#ff003c,#ff7b00);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}

.container{

width:100%;
max-width:650px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.25);

color:white;

box-shadow:0 15px 40px rgba(0,0,0,0.3);

}

.logo{

font-size:28px;

font-weight:bold;

text-align:center;

margin-bottom:25px;

}

.inputBox input{

width:100%;

padding:14px;

border-radius:10px;

border:none;

font-size:16px;

margin-bottom:12px;

}

.main-btn{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#ff003c;

color:white;

font-size:16px;

cursor:pointer;

}

.main-btn:hover{

background:#d90032;

}

.loader{

display:none;

text-align:center;

margin-top:15px;

}

.preview{

margin-top:20px;

animation:fadeIn 0.5s ease;

}

.preview img,
.preview video{

width:100%;

border-radius:12px;

}

.downloads{

margin-top:15px;

display:flex;

flex-direction:column;

gap:12px;

}

.download-btn{

display:flex;

align-items:center;

justify-content:center;

gap:10px;

padding:14px;

border:none;

border-radius:10px;

font-size:15px;

background:linear-gradient(135deg,#000,#333);

color:white;

cursor:pointer;

transition:0.3s;

}

.download-btn i{

font-size:18px;

}

.download-btn:hover{

transform:translateY(-2px);

background:linear-gradient(135deg,#222,#444);

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>


<div class="container">

<div class="logo">
<i class="fab fa-pinterest"></i> Pinterest Downloader
</div>


<div class="inputBox">

<input id="url" placeholder="Paste Pinterest link here">

<button class="main-btn" onclick="fetchMedia()">
Download
</button>

</div>


<div class="loader" id="loader">

<i class="fa fa-spinner fa-spin"></i> Fetching media...

</div>


<div class="preview" id="preview"></div>

<div class="downloads" id="downloads"></div>

</div>



<script>

async function fetchMedia(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Pinterest URL")

return

}

document.getElementById("loader").style.display="block"

let api=`https://universal-downloaders.vercel.app/api/pinterest/download?url=${encodeURIComponent(url)}`

try{

let res=await fetch(api)

let data=await res.json()

document.getElementById("loader").style.display="none"

let info=data.data

let preview=document.getElementById("preview")

let downloads=document.getElementById("downloads")

preview.innerHTML=""

downloads.innerHTML=""

let first=info.downloads[0].url


// VIDEO PREVIEW
if(first.includes(".mp4")){

preview.innerHTML=`<video controls src="${first}"></video>`

}

// IMAGE PREVIEW
else{

preview.innerHTML=`<img src="${info.thumbnail}">`

}


// DOWNLOAD BUTTONS
info.downloads.forEach(d=>{

let btn=document.createElement("button")

btn.className="download-btn"

btn.innerHTML=`<i class="fa fa-download"></i> Download ${d.quality} (${d.format})`

btn.onclick=()=>downloadFile(d.url)

downloads.appendChild(btn)

})

}

catch{

document.getElementById("loader").style.display="none"

alert("API Error")

}

}


// FORCE DOWNLOAD
function downloadFile(url){

const proxy=
"https://universal-downloaders.vercel.app/api/pinterest/file?url="+encodeURIComponent(url)

window.open(proxy)

}

</script>

</body>
</html>
