<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapInsta - Instagram Downloader</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* Background */
body{
  background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
  min-height:100vh;
  color:white;
}

/* Top Bar */
.topbar{
  background:#4338ca;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}

.topbar span{
  font-size:18px;
}

.menu{
  font-size:22px;
  cursor:pointer;
}

/* Header */
.header{
  background:white;
  color:black;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:700;
}

/* Category Icons */
.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

.cat{
  background:rgba(255,255,255,0.2);
  padding:10px 15px;
  border-radius:10px;
  backdrop-filter:blur(10px);
  font-size:14px;
}

/* Hero */
.hero{
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:32px;
  font-weight:700;
}

.hero p{
  margin-top:10px;
  font-size:15px;
  opacity:0.9;
}

/* Glass Card */
.card{
  max-width:500px;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

/* Input */
.input-box{
  display:flex;
  background:white;
  border-radius:14px;
  overflow:hidden;
}

.input-box input{
  flex:1;
  border:none;
  padding:14px;
  font-size:14px;
  outline:none;
}

.input-box button{
  background:#f3e8ff;
  border:none;
  padding:0 15px;
  cursor:pointer;
  font-weight:600;
}

/* Download Button */
.download-btn{
  margin-top:15px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background:#22c55e;
  color:white;
  transition:0.2s;
}

.download-btn:hover{
  background:#16a34a;
}

.download-btn:disabled{
  opacity:0.6;
}

/* Super Fast Loader */
.loader{
  margin-top:15px;
  text-align:center;
}

.spinner{
  width:30px;
  height:30px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  margin:auto;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* Result */
.result{
  margin-top:20px;
}

.media-card{
  background:white;
  color:black;
  border-radius:16px;
  padding:12px;
  margin-top:15px;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

.media-wrapper{
  position:relative;
}

.media-wrapper img,
.media-wrapper video{
  width:100%;
  border-radius:12px;
}

.media-wrapper video{
  display:none;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  cursor:pointer;
}

.media-card a{
  display:block;
  margin-top:8px;
  text-decoration:none;
  color:#16a34a;
  font-weight:600;
}

.error{
  margin-top:15px;
  color:#ffe4e6;
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
  <span>SnapInsta</span>
  <div class="menu">☰</div>
</div>

<div class="header">
  <div class="logo">Download Instagram</div>
</div>

<div class="categories">
  <div class="cat">🎬 Reels</div>
  <div class="cat">📷 Photo</div>
  <div class="cat">📺 Video</div>
  <div class="cat">📖 Story</div>
</div>

<div class="hero">
  <h1>Instagram Video Downloader</h1>
  <p>Download Instagram Videos, Photos & Reels instantly</p>
</div>

<div class="card">

  <div class="input-box">
    <input type="text" id="url" placeholder="Paste Instagram URL">
    <button onclick="paste()">Paste</button>
  </div>

  <button class="download-btn" id="btn" onclick="download()">
    ⬇ Download
  </button>

  <div class="loader" id="loader"></div>
  <div class="error" id="error"></div>
  <div class="result" id="result"></div>

</div>

<script>

function paste(){
  navigator.clipboard.readText()
  .then(text=>{
    document.getElementById("url").value=text;
  });
}

async function download(){

  const btn=document.getElementById("btn");
  const url=document.getElementById("url").value.trim();
  const loader=document.getElementById("loader");
  const error=document.getElementById("error");
  const result=document.getElementById("result");

  error.innerText="";
  result.innerHTML="";
  loader.innerHTML='<div class="spinner"></div>';
  btn.disabled=true;

  if(!url.includes("instagram")){
    loader.innerHTML="";
    btn.disabled=false;
    error.innerText="Please enter a valid Instagram URL";
    return;
  }

  try{

    const res=await fetch("https://alldown.yaartunah.workers.dev/",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({video_url:url})
    });

    const data=await res.json();

    loader.innerHTML="";
    btn.disabled=false;

    if(!data.success){
      error.innerText=data.message || "Download failed";
      return;
    }

    const items=data.data || data.message?.data;

    items.forEach(item=>{

      const card=document.createElement("div");
      card.className="media-card";

      if(item.url.includes(".mp4")){
        card.innerHTML=`
          <div class="media-wrapper">
            <img src="${item.thumbnail || item.url}">
            <div class="play-btn">▶</div>
            <video src="${item.url}" controls></video>
          </div>
          <a href="${item.url}" target="_blank">
            ⬇ Download Video
          </a>
        `;
      }else{
        card.innerHTML=`
          <img src="${item.url}">
          <a href="${item.url}" target="_blank">
            ⬇ Download Image
          </a>
        `;
      }

      result.appendChild(card);
    });

    document.querySelectorAll(".play-btn").forEach(btn=>{
      btn.addEventListener("click",function(){
        const wrapper=this.parentElement;
        const img=wrapper.querySelector("img");
        const video=wrapper.querySelector("video");
        img.style.display="none";
        this.style.display="none";
        video.style.display="block";
        video.play();
      });
    });

  }catch(e){
    loader.innerHTML="";
    btn.disabled=false;
    error.innerText="Server error";
  }
}

</script>

</body>
</html>
