<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snapchat Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fffc00,#ffd000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:600px;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
margin-top:20px;
}

.profile img{
width:40px;
height:40px;
border-radius:50%;
}

.viewer{
margin-top:20px;
position:relative;
}

video,img{
width:100%;
border-radius:15px;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:20px;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.prev{left:10px}
.next{right:10px}

.download{
display:block;
margin-top:10px;
background:#00c853;
padding:12px;
text-align:center;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.counter{
text-align:center;
margin-top:10px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h1>👻 Snapchat Downloader</h1>

<div class="input-box">
<input id="url" placeholder="Paste Snapchat URL">
<button onclick="fetchSnap()">Download</button>
</div>

<div class="loader" id="loader">Loading...</div>

<div class="profile" id="profile" style="display:none">
<img id="profilePic">
<span id="title"></span>
</div>

<div class="viewer" id="viewer"></div>

<div class="counter" id="counter"></div>

</div>

<script>

let snaps=[]
let index=0

function renderSnap(){

let snap=snaps[index]

let media=snap.snapUrls.mediaUrl

let html=""

if(snap.snapMediaType==1){

html=`
<video controls src="${media}"></video>
<a class="download" href="${media}" download="snap-${index}.mp4">
📥 Download Video
</a>
`

}else{

html=`
<img src="${media}">
<a class="download" href="${media}" download="snap-${index}.jpg">
📥 Download Image
</a>
`

}

html+=`
<button class="nav prev" onclick="prevSnap()"><i class="fa fa-chevron-left"></i></button>
<button class="nav next" onclick="nextSnap()"><i class="fa fa-chevron-right"></i></button>
`

document.getElementById("viewer").innerHTML=html

document.getElementById("counter").innerText=(index+1)+" / "+snaps.length

}

function nextSnap(){

if(index<snaps.length-1){
index++
renderSnap()
}

}

function prevSnap(){

if(index>0){
index--
renderSnap()
}

}

async function fetchSnap(){

let url=document.getElementById("url").value

if(!url){
alert("Enter Snapchat URL")
return
}

document.getElementById("loader").style.display="block"

let api=`https://universal-downloaders.vercel.app/api/snapchat/download?url=${encodeURIComponent(url)}`

try{

let res=await fetch(api)
let json=await res.json()

snaps=json.data.data.snapList

document.getElementById("profile").style.display="flex"

document.getElementById("profilePic").src=json.data.profilepic

document.getElementById("title").innerText=json.data.title

index=0

renderSnap()

}catch{

alert("Failed to fetch snaps")

}

document.getElementById("loader").style.display="none"

}

</script>

</body>

</html>
