<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snapchat Downloader</title>

<style>

body{
font-family:Arial;
background:#fffc00;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:600px;
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.snap{
margin-top:20px;
border-top:1px solid #eee;
padding-top:15px;
}

video,img{
width:100%;
border-radius:10px;
}

.download{
display:block;
margin-top:8px;
background:#00c853;
padding:10px;
color:white;
text-align:center;
border-radius:8px;
text-decoration:none;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>👻 Snapchat Downloader</h2>

<input id="url" placeholder="Paste Snapchat URL">

<button onclick="downloadSnap()">Download</button>

<div class="loader" id="loader">Loading...</div>

<div id="result"></div>

</div>

<script>

async function downloadSnap(){

let url=document.getElementById("url").value;

if(!url){
alert("Enter URL");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

let api=`https://universal-downloaders.vercel.app/api/snapchat/download?url=${encodeURIComponent(url)}`;

try{

let res=await fetch(api);
let json=await res.json();

let snaps=json.data.data.snapList;

let html="";

snaps.forEach((snap,i)=>{

let media=snap.snapUrls.mediaUrl;

if(snap.snapMediaType==1){

html+=`
<div class="snap">
<video controls src="${media}"></video>
<a class="download" href="${media}" download="snapchat-video-${i}.mp4">Download Video</a>
</div>
`;

}else{

html+=`
<div class="snap">
<img src="${media}">
<a class="download" href="${media}" download="snapchat-image-${i}.jpg">Download Image</a>
</div>
`;

}

});

document.getElementById("result").innerHTML=html;

}catch(e){

alert("Failed to fetch snaps");

}

document.getElementById("loader").style.display="none";

}

</script>

</body>

</html>
