<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#667eea,#764ba2,#ff0080);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}

.container{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border-radius:20px;

padding:25px;

box-shadow:0 8px 32px rgba(0,0,0,0.2);

color:white;
text-align:center;

}

h1{
font-size:22px;
margin-bottom:15px;
}

input{

width:100%;
padding:12px;

border:none;
outline:none;

border-radius:10px;

margin-top:10px;

}

button{

width:100%;
margin-top:10px;

padding:12px;

border:none;

border-radius:10px;

background:#ff2d75;

color:white;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#e6005c;

}

.loader{

display:none;

margin-top:20px;

}

.spinner{

border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;

width:40px;
height:40px;

border-radius:50%;

animation:spin 1s linear infinite;

margin:auto;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

.result{

margin-top:20px;
display:none;

}

.thumbnail{

width:100%;
border-radius:15px;
margin-bottom:10px;

}

video{

width:100%;
border-radius:15px;
margin-bottom:10px;

}

.download{

display:block;

margin-top:8px;

padding:10px;

background:#00e676;

color:black;

border-radius:10px;

text-decoration:none;

font-weight:600;

}

.type{

font-size:13px;
margin-bottom:10px;
opacity:0.9;

}

</style>

</head>

<body>

<div class="container">

<h1>Instagram Downloader</h1>

<input id="url" placeholder="Paste Instagram Reel / Post / Story link">

<button onclick="download()">Download</button>

<div class="loader" id="loader">

<div class="spinner"></div>
<p>Fetching media...</p>

</div>

<div class="result" id="result">

<p class="type" id="type"></p>

<img id="thumb" class="thumbnail">

<video id="player" controls></video>

<a id="hd" class="download">Download HD</a>

<a id="sd" class="download">Download SD</a>

</div>

</div>

<script>

async function download(){

let url=document.getElementById("url").value

if(!url){

alert("Paste Instagram URL")

return

}

document.getElementById("loader").style.display="block"
document.getElementById("result").style.display="none"

try{

let api=`https://universal-downloaders.vercel.app/api/meta/download?url=${encodeURIComponent(url)}`

let res=await fetch(api)

let data=await res.json()

let video=data.data.data[0].url
let thumb=data.data.data[0].thumbnail

document.getElementById("thumb").src=thumb
document.getElementById("player").src=video

document.getElementById("hd").href=video
document.getElementById("sd").href=video

let type="Instagram Post"

if(url.includes("/reel/")) type="Instagram Reel"
if(url.includes("/stories/")) type="Instagram Story"

document.getElementById("type").innerText=type

document.getElementById("loader").style.display="none"
document.getElementById("result").style.display="block"

}catch(e){

alert("Failed to fetch media")

document.getElementById("loader").style.display="none"

}

}

</script>

</body>
</html>
