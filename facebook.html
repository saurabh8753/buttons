<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook Video Downloader</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:14px;
max-width:420px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:22px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
}

#downloadBtn{
margin-top:10px;
width:100%;
background:#4f46e5;
border:none;
color:white;
padding:12px;
border-radius:8px;
cursor:pointer;
}

#downloadBtn:hover{
opacity:.9;
}

.loader{
margin-top:20px;
display:none;
text-align:center;
}

.spinner{
width:40px;
height:40px;
border:4px solid #ddd;
border-top:4px solid #4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

#preview{
margin-top:20px;
display:none;
}

video{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.quality{
display:flex;
justify-content:space-between;
align-items:center;
background:#f3f4f6;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.download{
background:#10b981;
padding:6px 12px;
border-radius:6px;
color:white;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Facebook Video Downloader</h1>

<input id="url" placeholder="Paste Facebook Video Link">

<button id="downloadBtn" onclick="getVideo()">
<i class="fa fa-download"></i> Fetch Video
</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Fetching Video...</p>
</div>

<div id="preview">

<video id="player" controls></video>

<div id="qualities"></div>

</div>

</div>

<script>

async function getVideo(){

let url=document.getElementById("url").value;

if(!url){
alert("Paste Facebook video link");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("preview").style.display="none";

let api=`https://universal-downloaders.vercel.app/api/meta/download?url=${encodeURIComponent(url)}`;

try{

let res=await fetch(api);
let data=await res.json();

document.getElementById("loader").style.display="none";

if(!data.success){
alert("Video not found");
return;
}

let videos=data.data.data;

let player=document.getElementById("player");

let first=videos[0];

let firstLink=first.url;

if(first.shouldRender){
firstLink="https://universal-downloaders.vercel.app"+first.url;
}

player.src=firstLink;

let html="";

videos.forEach(v=>{

let link=v.url;

if(v.shouldRender){
link="https://universal-downloaders.vercel.app"+v.url;
}

html+=`

<div class="quality">

<span>${v.resolution}</span>

<a class="download" href="${link}" target="_blank">
Download
</a>

</div>

`;

});

document.getElementById("qualities").innerHTML=html;

document.getElementById("preview").style.display="block";

}catch(e){

document.getElementById("loader").style.display="none";

alert("Error fetching video");

}

}

</script>

</body>
</html>
