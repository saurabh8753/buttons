<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terabox Video Downloader</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
}

button{
padding:15px 25px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.video-box{
margin-top:30px;
}

video{
width:100%;
border-radius:10px;
}

.thumbnail{
width:100%;
border-radius:10px;
margin-top:20px;
}

.file-info{
margin-top:10px;
color:#94a3b8;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#22c55e;
border-radius:8px;
text-decoration:none;
color:white;
}

.loader{
margin-top:20px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Terabox Video Downloader</h1>

<input id="url" placeholder="Paste Terabox Link">

<button onclick="getVideo()">Get Video</button>

<div class="loader" id="loader">Fetching video...</div>

<div id="result"></div>

</div>

<script>

async function getVideo(){

let url=document.getElementById("url").value;

if(!url){
alert("Enter Terabox link");
return;
}

document.getElementById("loader").style.display="block";

let api="https://universal-downloaders.vercel.app/api/terabox/download?url="+encodeURIComponent(url);

let res=await fetch(api);
let data=await res.json();

document.getElementById("loader").style.display="none";

if(!data.success){
alert("Failed to fetch video");
return;
}

let file=data.data.data["📄 Files"][0];

let name=file["📂 Name"];
let size=file["📏 Size"];
let video=file["🔽 Direct Download Link"];
let thumb=file["🖼️ Thumbnails"]["850x580"];

document.getElementById("result").innerHTML=`

<img class="thumbnail" src="${thumb}">

<div class="video-box">

<video controls src="${video}"></video>

</div>

<div class="file-info">
${name}<br>
Size: ${size}
</div>

<a class="download-btn" href="${video}" download>
Download Video
</a>

`;

}

</script>

</body>
</html>
