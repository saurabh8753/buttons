<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TeraBox Player Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-5">

    <div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
        <h1 class="text-xl font-bold text-center text-blue-400 mb-6">TeraBox Fix Downloader</h1>

        <input type="text" id="teraUrl" placeholder="Paste TeraBox Link..." 
            class="w-full p-4 rounded-lg bg-gray-700 border-none focus:ring-2 focus:ring-blue-500 mb-4 outline-none">
        
        <button onclick="fetchVideo()" id="fetchBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold">
            Get Video Link
        </button>

        <div id="loading" class="hidden text-center my-6 text-blue-400 animate-pulse">Processing... Please wait</div>

        <div id="result" class="hidden mt-6 space-y-4">
            <div class="bg-black p-4 rounded-lg border border-gray-600">
                <p id="fileName" class="text-sm font-medium break-all"></p>
                <p id="fileSize" class="text-xs text-gray-400 mt-1"></p>
            </div>

            <video id="videoPlayer" controls class="w-full rounded-lg bg-black aspect-video shadow-xl"></video>

            <div class="flex flex-col gap-3">
                <a id="downloadBtn" href="#" target="_blank" class="bg-green-600 text-center py-3 rounded-lg font-bold">Download File</a>
                <button onclick="copyLink()" class="bg-gray-600 py-3 rounded-lg font-bold">Copy Direct Link</button>
            </div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const urlInput = document.getElementById('teraUrl').value.trim();
            const fetchBtn = document.getElementById('fetchBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!urlInput) return alert("Link paste karein!");

            loading.classList.remove('hidden');
            result.classList.add('hidden');
            fetchBtn.disabled = true;

            try {
                const proxyUrl = "https://universal-downloaders.vercel.app/api/terabox/download?url=";
                const response = await fetch(proxyUrl + encodeURIComponent(urlInput));
                const res = await response.json();

                // Yahan hum structure ko deep check kar rahe hain
                const data = res.data?.data || res.data;
                const files = data?.["📄 Files"] || data?.["📄_Files"] || [];

                if (files.length > 0) {
                    const file = files[0];
                    const dlLink = file["🔽 Direct Download Link"] || file["🔽_Direct_Download_Link"];

                    document.getElementById('fileName').innerText = file["📂 Name"] || file["📂_Name"];
                    document.getElementById('fileSize').innerText = "Size: " + (file["📏 Size"] || file["📏_Size"]);
                    
                    const player = document.getElementById('videoPlayer');
                    player.src = dlLink;
                    
                    document.getElementById('downloadBtn').href = dlLink;
                    window.currentDlLink = dlLink; // For copy button

                    result.classList.remove('hidden');
                } else {
                    alert("Video link nahi mil paya. Shayad link galat hai.");
                }
            } catch (err) {
                console.error(err);
                alert("API Error! Browser issue ya network error ho sakta hai.");
            } finally {
                loading.classList.add('hidden');
                fetchBtn.disabled = false;
            }
        }

        function copyLink() {
            if (window.currentDlLink) {
                navigator.clipboard.writeText(window.currentDlLink);
                alert("Link copied to clipboard!");
            }
        }
    </script>
</body>
</html>
