<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TeraPlayer Pro - Video.js Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Video.js Skin Customization */
        .video-js {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }
        .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            background-color: rgba(59, 130, 246, 0.8) !important;
            border-radius: 50% !important;
            width: 2em !important;
            height: 2em !important;
            line-height: 2em !important;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-500 mb-2 tracking-tight">TeraPlayer <span class="text-white">Pro</span></h1>
            <p class="text-gray-400">High-speed streaming & direct downloads</p>
        </div>

        <div class="glass-card p-5 rounded-2xl shadow-2xl mb-8">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="urlInput" placeholder="Paste TeraBox Link (e.g. https://1024terabox.com/s/...)" 
                       class="flex-1 bg-gray-900/50 border border-gray-700 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="fetchVideo()" id="fetchBtn" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-2 min-w-[160px]">
                    <span id="loader" class="hidden animate-spin"><i class="fas fa-spinner"></i></span>
                    <span id="btnText">Get Video</span>
                </button>
            </div>
        </div>

        <div id="playerSection" class="hidden animate-in fade-in duration-500">
            <div class="glass-card p-2 rounded-2xl mb-6 shadow-2xl">
                <video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" data-setup='{}'>
                    <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video</p>
                </video>
            </div>

            <div class="glass-card p-6 rounded-2xl flex flex-col md:flex-row items-center gap-6">
                <div id="fileThumb" class="w-24 h-24 bg-gray-800 rounded-xl bg-cover bg-center border border-gray-700"></div>
                <div class="flex-1 text-center md:text-left">
                    <h2 id="fileName" class="text-xl font-bold mb-1 line-clamp-2">Video Name.mp4</h2>
                    <p id="fileSize" class="text-blue-400 font-medium italic">Size: 0 MB</p>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <a id="dlBtn" href="#" target="_blank" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl font-bold text-center flex items-center justify-center gap-2 transition-all">
                        <i class="fas fa-download"></i> Download
                    </a>
                </div>
            </div>
        </div>

        <div id="errorBox" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/50 text-red-400 rounded-xl text-center">
            <i class="fas fa-exclamation-triangle mr-2"></i> <span>Failed to fetch. Link might be expired or private.</span>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Initialize Video.js
        const player = videojs('my-video');

        async function fetchVideo() {
            const input = document.getElementById('urlInput').value.trim();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const playerSection = document.getElementById('playerSection');
            const errorBox = document.getElementById('errorBox');

            if (!input) return alert("Please enter a link!");

            // UI State: Loading
            errorBox.classList.add('hidden');
            loader.classList.remove('hidden');
            btnText.innerText = "Processing...";
            
            try {
                const response = await fetch(`https://universal-downloaders.vercel.app/api/terabox/download?url=${encodeURIComponent(input)}`);
                const result = await response.json();

                if (result.success && result.data.data["📄 Files"].length > 0) {
                    const file = result.data.data["📄 Files"][0];
                    const downloadUrl = file["🔽 Direct Download Link"];

                    // Update UI Details
                    document.getElementById('fileName').innerText = file["📂 Name"];
                    document.getElementById('fileSize').innerText = "Size: " + file["📏 Size"];
                    document.getElementById('fileThumb').style.backgroundImage = `url('${file["🖼️ Thumbnails"]["360x270"]}')`;
                    document.getElementById('dlBtn').href = downloadUrl;

                    // Update Video Player Source
                    player.src({
                        src: downloadUrl,
                        type: 'video/mp4' // Aap 'video/webm' ya 'application/x-mpegURL' bhi try kar sakte hain formats ke hisab se
                    });
                    
                    player.load();
                    playerSection.classList.remove('hidden');
                    
                    // Scroll to player
                    playerSection.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error("Invalid Response");
                }
            } catch (err) {
                console.error(err);
                errorBox.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "Get Video";
            }
        }
    </script>
</body>
</html>
