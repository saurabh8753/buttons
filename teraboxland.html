<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Tera Pro Player</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .main-card {
            max-width: 900px;
            margin: 20px auto;
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Video.js Custom Styling */
        .video-js {
            width: 100%;
            aspect-ratio: 16/9;
        }
        .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            width: 2.5em !important;
            height: 2.5em !important;
            line-height: 2.5em !important;
            background-color: rgba(59, 130, 246, 0.8) !important;
            border: none !important;
        }
        .btn-gradient {
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }
    </style>
</head>
<body class="p-4">

    <div class="main-card" id="app">
        <div id="loading" class="py-20 text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-gray-400 animate-pulse">Fetching Secure Stream...</p>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        async function loadVideo() {
            const app = document.getElementById("app");
            const videoUrl = new URLSearchParams(location.search).get("url");

            if (!videoUrl) {
                app.innerHTML = `
                    <div class="p-10 text-center">
                        <i class="fas fa-link-slash text-5xl text-red-500 mb-4"></i>
                        <h2 class="text-xl font-bold">No URL Provided</h2>
                        <p class="text-gray-400">Please provide a valid TeraBox link in the URL.</p>
                    </div>`;
                return;
            }

            try {
                const api = `https://ztera.yaartunah.workers.dev/?url=${encodeURIComponent(videoUrl)}`;
                const res = await fetch(api);
                const data = await res.json();

                if (data.status !== "success") throw new Error("API Error");

                const file = data.list[0];
                // Sabse best available stream pick karein
                const stream = file.fast_stream_url?.["720p"] || file.fast_stream_url?.["480p"] || file.stream_url;

                app.innerHTML = `
                    <div class="video-container">
                        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" poster="${file.thumbnail}">
                            <source src="${stream}" type="video/mp4">
                        </video>
                    </div>
                    
                    <div class="p-6">
                        <h1 class="text-xl md:text-2xl font-bold mb-4 leading-tight text-blue-100">${file.name}</h1>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                            <div class="bg-black/20 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-400 uppercase">Size</p>
                                <p class="font-bold text-sm">${file.size_formatted}</p>
                            </div>
                            <div class="bg-black/20 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-400 uppercase">Duration</p>
                                <p class="font-bold text-sm">${file.duration || 'N/A'}</p>
                            </div>
                            <div class="bg-black/20 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-400 uppercase">Quality</p>
                                <p class="font-bold text-sm text-green-400">${file.quality}</p>
                            </div>
                            <div class="bg-black/20 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-400 uppercase">Format</p>
                                <p class="font-bold text-sm italic">MP4/HLS</p>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4">
                            <a href="${file.download_link}" target="_blank" class="btn-gradient flex-1 bg-blue-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                                <i class="fas fa-download"></i> Direct Download
                            </a>
                            <a href="${file.fast_download_link}" target="_blank" class="btn-gradient flex-1 bg-emerald-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20">
                                <i class="fas fa-bolt"></i> Fast Download
                            </a>
                        </div>
                    </div>
                `;

                // Initialize Video.js
                const player = videojs('my-video', {
                    fluid: true,
                    playbackRates: [0.5, 1, 1.25, 1.5, 2]
                });

            } catch (error) {
                app.innerHTML = `<div class="p-10 text-center text-red-400">Failed to load video. Link might be expired.</div>`;
                console.error(error);
            }
        }

        loadVideo();
    </script>
</body>
</html>
