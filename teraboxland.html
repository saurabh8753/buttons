<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="container mx-auto px-4 py-10 max-w-4xl">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">
            <i class="fas fa-play-circle mr-2"></i>TeraBox Player & Downloader
        </h1>

        <div class="bg-gray-800 p-6 rounded-lg shadow-xl mb-8">
            <label class="block mb-2 text-sm font-medium">TeraBox URL Paste Karein:</label>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="teraUrl" placeholder="https://1024terabox.com/s/..." 
                    class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                <button onclick="fetchVideo()" id="fetchBtn"
                    class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded font-bold transition duration-200">
                    Fetch Video
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mx-auto"></div>
            <p class="mt-4">Fetching file details...</p>
        </div>

        <div id="result" class="hidden space-y-6">
            
            <div class="bg-black rounded-lg overflow-hidden shadow-2xl">
                <video id="videoPlayer" controls class="w-full aspect-video bg-black">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg border-l-4 border-blue-500">
                <h2 id="fileName" class="text-xl font-semibold mb-2 truncate">Video Name</h2>
                <p id="fileSize" class="text-gray-400 mb-4">Size: 0 MB</p>
                
                <div class="flex flex-wrap gap-4">
                    <a id="downloadBtn" href="#" target="_blank"
                        class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded flex items-center font-bold">
                        <i class="fas fa-download mr-2"></i> Download Now
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const urlInput = document.getElementById('teraUrl').value;
            const fetchBtn = document.getElementById('fetchBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!urlInput) {
                alert("Please enter a TeraBox URL");
                return;
            }

            // UI Reset
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            fetchBtn.disabled = true;

            try {
                const apiUrl = `https://universal-downloaders.vercel.app/api/terabox/download?url=${encodeURIComponent(urlInput)}`;
                const response = await fetch(apiUrl);
                const json = await response.json();

                if (json.success && json.data.📄_Files.length > 0) {
                    const fileData = json.data.📄_Files[0];
                    const downloadLink = fileData["🔽_Direct_Download_Link"];
                    
                    // Update UI with Data
                    document.getElementById('fileName').innerText = fileData["📂_Name"];
                    document.getElementById('fileSize').innerText = `Size: ${fileData["📏_Size"]}`;
                    
                    // Update Player & Download Link
                    const player = document.getElementById('videoPlayer');
                    player.src = downloadLink;
                    
                    const dlBtn = document.getElementById('downloadBtn');
                    dlBtn.href = downloadLink;

                    // Show Results
                    result.classList.remove('hidden');
                } else {
                    alert("Video details nahi mil payein. Link check karein.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("API Error! Thodi der baad try karein.");
            } finally {
                loading.classList.add('hidden');
                fetchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
