<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TeraBox Fast Streamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 font-sans">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">TeraBox Player Fixed</h1>
        </div>

        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl mb-6">
            <input type="text" id="teraUrl" placeholder="TeraBox link paste karein..." 
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none mb-3">
            <button onclick="fetchVideo()" id="fetchBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition-all">
                Fetch Video
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-2">Link generate ho raha hai...</p>
        </div>

        <div id="result" class="hidden space-y-4">
            
            <div class="bg-black rounded-2xl overflow-hidden border border-slate-700">
                <video id="videoPlayer" controls preload="auto" class="w-full aspect-video bg-black"></video>
                <div class="p-3 bg-slate-800 border-t border-slate-700">
                    <p id="fileName" class="text-sm font-bold truncate">Filename.mp4</p>
                    <p id="fileSize" class="text-xs text-gray-400 mt-1 uppercase">Size: 0 MB</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="openInVLC()" class="flex items-center justify-center gap-2 bg-orange-600 py-3 rounded-xl font-bold text-sm">
                    <i class="fas fa-orange-vlc"></i> Play VLC
                </button>
                
                <button onclick="openInMX()" class="flex items-center justify-center gap-2 bg-blue-600 py-3 rounded-xl font-bold text-sm">
                    <i class="fas fa-play-circle"></i> Play MX
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <a id="downloadBtn" href="#" target="_blank" class="flex items-center justify-center gap-2 bg-emerald-600 py-3 rounded-xl font-bold text-sm text-center">
                    <i class="fas fa-download"></i> Download
                </a>
                <button onclick="copyDirectLink()" class="bg-slate-700 py-3 rounded-xl font-bold text-sm">
                    <i class="fas fa-copy"></i> Copy Link
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentLink = "";

        async function fetchVideo() {
            const urlInput = document.getElementById('teraUrl').value.trim();
            const fetchBtn = document.getElementById('fetchBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!urlInput) return alert("Link daalein!");

            loading.classList.remove('hidden');
            result.classList.add('hidden');
            fetchBtn.disabled = true;

            try {
                const apiUrl = `https://universaldownloaders.yaartunah.workers.dev/?url=${encodeURIComponent(urlInput)}`;
                const response = await fetch(apiUrl);
                const res = await response.json();

                const data = res.data?.data || res.data;
                const files = data?.["📄 Files"] || data?.["📄_Files"] || [];

                if (files.length > 0) {
                    const file = files[0];
                    currentLink = file["🔽 Direct Download Link"] || file["🔽_Direct_Download_Link"];

                    document.getElementById('fileName').innerText = file["📂 Name"] || file["📂_Name"];
                    document.getElementById('fileSize').innerText = "Size: " + (file["📏 Size"] || file["📏_Size"]);
                    
                    // Browser Player update
                    document.getElementById('videoPlayer').src = currentLink;
                    document.getElementById('downloadBtn').href = currentLink;

                    result.classList.remove('hidden');
                } else {
                    alert("Error: Link invalid hai!");
                }
            } catch (err) {
                alert("Server issue!");
            } finally {
                loading.classList.add('hidden');
                fetchBtn.disabled = false;
            }
        }

        // VLC Fix: Using vlc:// protocol for direct trigger
        function openInVLC() {
            if (!currentLink) return;
            const vlcUrl = `vlc://${currentLink.replace(/^https?:\/\//, '')}`;
            window.location.href = vlcUrl;
            
            // Fallback for Android Intent if protocol fails
            setTimeout(() => {
                window.location.href = `intent://${currentLink.replace(/^https?:\/\//, '')}#Intent;scheme=http;package=org.videolan.vlc;end`;
            }, 500);
        }

        // MX Player Fix: Using intent with correct scheme
        function openInMX() {
            if (!currentLink) return;
            window.location.href = `intent:${currentLink}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent("TeraBox Video")};end`;
        }

        function copyDirectLink() {
            if (currentLink) {
                navigator.clipboard.writeText(currentLink);
                alert("Direct Link Copied!");
            }
        }
    </script>
</body>
</html>
