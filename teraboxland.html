<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terabox Video Player</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
padding:30px;
}

.container{
max-width:750px;
width:100%;
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:14px 20px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.player-card{
margin-top:25px;
background:#1e293b;
padding:15px;
border-radius:12px;
}

.thumbnail{
width:100%;
border-radius:10px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
background:black;
}

.info{
margin-top:10px;
color:#cbd5f5;
}

.download{
display:block;
margin-top:15px;
background:#22c55e;
padding:14px;
text-align:center;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

.loader{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
border:5px solid #334155;
border-top:5px solid #3b82f6;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="container">

<h1>Terabox Video Player</h1>

<div class="input-box">
<input id="url" placeholder="Paste Terabox Link">
<button onclick="loadVideo()">Get Video</button>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Fetching Video...</p>
</div>

<div id="result"></div>

</div>

<script>

async function loadVideo(){

let url=document.getElementById("url").value;

if(!url){
alert("Paste Terabox link");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

let api="https://universal-downloaders.vercel.app/api/terabox/download?url="+encodeURIComponent(url);

try{

let res=await fetch(api);
let data=await res.json();

document.getElementById("loader").style.display="none";

let file=data.data.data["📄 Files"][0];

let name=file["📂 Name"];
let size=file["📏 Size"];
let video=file["🔽 Direct Download Link"];
let thumb=file["🖼️ Thumbnails"]["850x580"];

document.getElementById("result").innerHTML=`

<div class="player-card">

<img class="thumbnail" src="${thumb}">

<video id="player" controls playsinline preload="metadata" poster="${thumb}">
<source src="${video}" type="video/mp4">
</video>

<div class="info">
<b>${name}</b><br>
Size: ${size}
</div>

<a class="download" href="${video}" download>
Download Video
</a>

</div>

`;

}catch(e){

document.getElementById("loader").style.display="none";
alert("Failed to fetch video");

}

}

</script>

</body>
</html>
